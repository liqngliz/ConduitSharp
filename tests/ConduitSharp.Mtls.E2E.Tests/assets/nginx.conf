events {}
http {
  server {
    listen 443 ssl;
    server_name upstream;

    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    # Require and verify a client certificate signed by our CA (mutual TLS).
    ssl_client_certificate /certs/ca.crt;
    ssl_verify_client on;

    location / {
      add_header Content-Type text/plain;
      # $ssl_client_verify is SUCCESS only when a valid client cert was presented.
      return 200 "mtls-ok client=$ssl_client_s_dn verify=$ssl_client_verify\n";
    }
  }
}
