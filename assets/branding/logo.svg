<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Concept 2: "Gateway hex" — many routes in, one governed flow out -->
  <rect width="128" height="128" rx="24" fill="#1E1B2E"/>
  <!-- three inbound routes -->
  <g stroke="#7B61E0" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M14 40 Q34 40 44 56"/>
    <path d="M12 64 H42"/>
    <path d="M14 88 Q34 88 44 72"/>
  </g>
  <!-- the gateway node -->
  <path d="M64 34 L88 48 L88 80 L64 94 L40 80 L40 48 Z" fill="#512BD4" stroke="#B9A7F2" stroke-width="5"/>
  <!-- sharp accent inside -->
  <text x="64" y="76" font-family="Menlo, Consolas, monospace" font-size="34" font-weight="bold" fill="#FFFFFF" text-anchor="middle">#</text>
  <!-- one outbound flow -->
  <g stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M88 64 H106"/>
  </g>
  <path d="M104 55 L118 64 L104 73 Z" fill="#FFFFFF"/>
</svg>
