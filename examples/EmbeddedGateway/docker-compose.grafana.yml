services:

  # ---------------------------------------------------------------------------
  # Observability stack: OTel Collector → Tempo (traces) + Prometheus (metrics) + Loki (logs)
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (gateway → collector)
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
      - loki

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml
      - loki-data:/loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  inventory-svc-1:
    build:
      context: ../..
      dockerfile: examples/EmbeddedGateway/docker/inventory-svc/Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:6101
    expose:
      - "6101"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6101/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  inventory-svc-2:
    build:
      context: ../..
      dockerfile: examples/EmbeddedGateway/docker/inventory-svc/Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:6101
    expose:
      - "6101"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6101/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  order-svc:
    build:
      context: ../..
      dockerfile: examples/EmbeddedGateway/docker/order-svc/Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:6201
    expose:
      - "6201"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6201/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  gateway:
    build:
      context: ../..
      dockerfile: examples/EmbeddedGateway/docker/gateway/Dockerfile
    ports:
      - "6050:6050"
    environment:
      - ASPNETCORE_URLS=http://+:6050
      - Gateway__RoutesPath=/app/Configuration/docker-routes.json
      - Gateway__PluginsPath=/app/plugins
      - Gateway__BasePath=/app
      - GATEWAY_CONFIG_FILE=/app/configuration-grafana/appsettings.json
    depends_on:
      otel-collector:
        condition: service_started
      inventory-svc-1:
        condition: service_healthy
      inventory-svc-2:
        condition: service_healthy
      order-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6050/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:
