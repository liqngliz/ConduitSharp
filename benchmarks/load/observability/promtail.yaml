server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: envoy-tap
    static_configs:
      - targets:
          - localhost
        labels:
          job: envoy-tap
          __path__: /tmp/envoy-logs/access.json
    pipeline_stages:
      - match:
          selector: '{job="envoy-tap"}'
          stages:
            - regex:
                expression: '.*"x-request-id":"(?P<trace_id>[^"]+)".*'
            # Removed traceID label to prevent high cardinality streams

  - job_name: conduit-file
    static_configs:
      - targets:
          - localhost
        labels:
          job: conduit-file
          __path__: /tmp/envoy-logs/conduit.json
