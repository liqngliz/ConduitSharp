# 1 KB static response upstream, mirroring APISIX's benchmark upstream.
# Two server blocks = two round-robin "nodes" for the gateway's cluster.
worker_processes 2;
events { worker_connections 4096; }
http {
    access_log off;
    keepalive_requests 100000;
    client_max_body_size 0;   # Phase 3 flood posts multi-MB bodies

    server {
        listen 8081;
        location /big { alias /payload/128k.bin; }
        location /big1m { alias /payload/1mb.bin; }
        location / { return 200 ""; }
    }
    server {
        listen 8082;
        location /big { alias /payload/128k.bin; }
        location /big1m { alias /payload/1mb.bin; }
        location / { return 200 ""; }
    }
}
